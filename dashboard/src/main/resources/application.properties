# Supabase PostgreSQL Database (Session Pooler - IPv4 compatible)
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings (Prevent Supabase MaxClients error)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8081

# Bean overriding
spring.main.allow-bean-definition-overriding=true

# Disable Docker Compose support (using Supabase instead)
spring.docker.compose.enabled=false

# Support for loading environment variables from .env file
spring.config.import=optional:file:.env[.properties]